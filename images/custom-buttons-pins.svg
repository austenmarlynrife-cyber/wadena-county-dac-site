    <text x="700" y="286" text-anchor="middle" font-size="34" fill="#37573b" font-family="Georgia" font-weight="700">COMMUNITY</text>
    <text x="700" y="322" text-anchor="middle" font-size="24" fill="#5e6657" font-family="Trebuchet MS">STRONG</text>
