<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Custom campaign and sports buttons and pins">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e6"/>
      <stop offset="1" stop-color="#ffe9d1"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="ring3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="200" cy="130" r="120" fill="#f97316" opacity="0.12"/>
  <circle cx="1020" cy="120" r="140" fill="#3b82f6" opacity="0.12"/>
  <circle cx="1040" cy="690" r="120" fill="#22c55e" opacity="0.12"/>

  <g filter="url(#shadow)">
    <g transform="translate(290 330)">
      <circle r="170" fill="url(#ring1)"/>
      <circle r="134" fill="#fff7ed"/>
      <text x="0" y="-18" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="800" fill="#9a3412">TEAM PRIDE</text>
      <text x="0" y="24" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#9a3412">Go Trojans!</text>
      <circle cx="0" cy="72" r="20" fill="#f97316"/>
      <polygon points="0,52 6,67 22,67 9,77 14,92 0,83 -14,92 -9,77 -22,67 -6,67" fill="#fff"/>
    </g>

    <g transform="translate(620 280)">
      <circle r="132" fill="url(#ring2)"/>
      <circle r="102" fill="#eff6ff"/>
      <text x="0" y="-8" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="800" fill="#1d4ed8">VOTE</text>
      <text x="0" y="26" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1d4ed8">LOCAL</text>
      <rect x="-42" y="44" width="84" height="22" rx="11" fill="#2563eb"/>
      <text x="0" y="60" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">2026</text>
    </g>

    <g transform="translate(850 390)">
      <circle r="152" fill="url(#ring3)"/>
      <circle r="120" fill="#f0fdf4"/>
      <text x="0" y="-12" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800" fill="#15803d">SENIOR NIGHT</text>
      <text x="0" y="22" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#15803d">BASKETBALL</text>
      <circle cx="0" cy="72" r="24" fill="#f97316"/>
      <path d="M-24 72h48M0 48v48M-17 55c9 5 15 11 17 17M17 55c-9 5-15 11-17 17M-17 89c9-5 15-11 17-17M17 89c-9-5-15-11-17-17" stroke="#7c2d12" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>

    <g transform="translate(510 540)">
      <rect x="-105" y="-38" width="210" height="76" rx="18" fill="#fff" stroke="#f59e0b" stroke-width="3"/>
      <text x="0" y="7" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="800" fill="#b45309">CUSTOM BUTTONS</text>
    </g>
