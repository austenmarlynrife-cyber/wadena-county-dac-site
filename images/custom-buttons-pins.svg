<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="t d">
  <title id="t">Custom buttons and pins</title>
  <desc id="d">Collection of custom campaign and team buttons.</desc>
  <rect width="900" height="560" fill="#f5ede1"/>
  <g fill="#2f5a3b" opacity=".18">
    <circle cx="130" cy="90" r="70"/><circle cx="760" cy="110" r="85"/><circle cx="690" cy="470" r="100"/>
  </g>
  <g>
    <circle cx="220" cy="270" r="110" fill="#fff9ee" stroke="#a77e45" stroke-width="10"/>
    <text x="220" y="250" text-anchor="middle" font-size="42" fill="#37573b" font-family="Georgia" font-weight="700">VOTE</text>
    <text x="220" y="292" text-anchor="middle" font-size="24" fill="#5e6657" font-family="Trebuchet MS">2026</text>
  </g>
  <g>
