<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Custom wedding and graduation napkins">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="paper1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fffaf0"/>
    </linearGradient>
    <linearGradient id="paper2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg2)"/>
  <circle cx="160" cy="120" r="120" fill="#fb923c" opacity="0.12"/>
  <circle cx="1010" cy="150" r="140" fill="#60a5fa" opacity="0.12"/>

  <g filter="url(#shadow2)">
    <g transform="translate(370 420) rotate(-9)">
      <rect x="-180" y="-120" width="360" height="240" rx="18" fill="url(#paper1)" stroke="#fdba74" stroke-width="4"/>
      <text x="0" y="-22" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="38" font-weight="700" fill="#9a3412">Emma &amp; Luke</text>
      <line x1="-130" y1="-2" x2="130" y2="-2" stroke="#fdba74" stroke-width="2"/>
      <text x="0" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#9a3412">June 20, 2026</text>
      <text x="0" y="72" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#c2410c">Wedding Celebration</text>
    </g>

    <g transform="translate(790 400) rotate(8)">
      <rect x="-180" y="-120" width="360" height="240" rx="18" fill="url(#paper2)" stroke="#93c5fd" stroke-width="4"/>
      <text x="0" y="-26" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#1d4ed8">CLASS OF 2026</text>
      <text x="0" y="12" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">CONGRATS AVERY!</text>
      <rect x="-88" y="32" width="176" height="34" rx="17" fill="#2563eb"/>
      <text x="0" y="56" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Sebeka High</text>
      <path d="M-95 87h190" stroke="#60a5fa" stroke-width="3"/>
      <text x="0" y="110" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">Custom Colors and Foil</text>
    </g>
  </g>

  <g transform="translate(600 690)">
    <rect x="-215" y="-36" width="430" height="72" rx="18" fill="#fff" stroke="#f59e0b" stroke-width="3"/>
    <text x="0" y="9" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#b45309">CUSTOM NAPKINS</text>
  </g>
</svg>
